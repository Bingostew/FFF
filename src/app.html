<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
		%sveltekit.head%
		
		<style>
    	/* 1. CSS Lockdown: Stops trackpad pinch-to-zoom and overscroll bounce */
   		body, html {
        touch-action: none; 
        overscroll-behavior: none; 
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden; /* Absolutely no rogue scrollbars */
   		}
		</style>

		<script>
			/* 2. Desktop Mouse Lockdown: Stops Ctrl + Scroll Wheel */
			document.addEventListener('wheel', function(e) {
				if (e.ctrlKey || e.metaKey) {
					e.preventDefault();
				}
			}, { passive: false });

			/* 3. Desktop Keyboard Lockdown: Stops Ctrl + Plus/Minus */
			document.addEventListener('keydown', function(e) {
				// Intercepts Ctrl/Cmd + '=', '-', '+', or '_'
				if ((e.ctrlKey || e.metaKey) && (e.key === '=' || e.key === '-' || e.key === '+' || e.key === '_')) {
					e.preventDefault();
				}
			});

			/* Optional: Stops double-tap to zoom on older iOS devices that ignore the meta tag */
			document.addEventListener('dblclick', function(e) {
				e.preventDefault();
			}, { passive: false });
		</script>
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
